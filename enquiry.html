<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | Solar Solutions</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="header">
            <h1>Solar Solutions</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="enquiry.html">Enquiry</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="form-container">
            <h2>Send an Enquiry</h2>
            <form action="#">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>

                <label for="interest">Interested in:</label>
                <select id="interest" name="interest">
                    <option value="solar">Solar Panels</option>
                    <option value="battery">Battery Backup</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="consultation">Energy Consultation</option>
                </select>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" placeholder="Tell us about your energy needs..."></textarea>

                <button type="submit" class="cta-button">Submit Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Solar Solutions. All Rights Reserved.</p>
        <p>Follow us on: <a href="https://facebook.com">Facebook</a> and <a href="https://instagram.com">Instagram</a></p>
    </footer>
</body>
</html>
