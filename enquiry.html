<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | Solar Solutions</title>
    <meta name="description" content="Submit an enquiry to Solar Solutions. Tell us about your energy needs and we will give you a cost estimate and availability for solar panels, battery backup, or maintenance.">
    <meta name="keywords" content="solar enquiry, solar panel quote south africa, battery backup cost, renewable energy germiston">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="header">
            <h1>Solar Solutions</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="enquiry.html">Enquiry</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="form-container">
            <h2>Send an Enquiry</h2>
            <p>Fill in your details below and we will get back to you with pricing and availability.</p>

            <form id="enquiryForm" novalidate>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>
                <span class="error" id="nameError"></span>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
                <span class="error" id="emailError"></span>

                <label for="interest">Interested in:</label>
                <select id="interest" name="interest">
                    <option value="solar">Solar Panels</option>
                    <option value="battery">Battery Backup</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="consultation">Energy Consultation</option>
                </select>

                <label for="message">Message (optional):</label>
                <textarea id="message" name="message" rows="4" placeholder="Tell us about your energy needs or property..."></textarea>

                <button type="submit" class="cta-button">Get My Estimate</button>
            </form>

            <div id="enquiryResponse" class="form-response" style="display:none;"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Solar Solutions. All Rights Reserved.</p>
        <p>Follow us on: <a href="https://facebook.com">Facebook</a> and <a href="https://instagram.com">Instagram</a></p>
    </footer>

    <script src="js/enquiry.js"></script>
</body>
</html>
